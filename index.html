<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>7-Day Meal Planner (Ben + Kathleen)</title>
  <style>
    :root{
      --bg:#f7f7f8; --card:#fff; --border:#e7e7ea; --muted:#6b7280; --text:#111827;
      --shadow:0 10px 28px rgba(0,0,0,.07);
    }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:22px;}
    .container{max-width:1220px;margin:0 auto;}
    .topbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    h1{font-size:22px;margin:0;letter-spacing:-.02em;}
    .sub{color:var(--muted);font-size:13px;margin-top:2px;}
    .spacer{flex:1;}

    .btn{padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;font-weight:800;cursor:pointer;}
    .btn.primary{background:#111827;color:#fff;border-color:#111827;}
    .btn:disabled{opacity:.6;cursor:not-allowed;}

    .tabs{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:#fff;}
    .tab{padding:8px 12px;border:0;background:transparent;cursor:pointer;font-weight:900;color:#111827;}
    .tab.active{background:#111827;color:#fff;}

    .row{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:var(--shadow);}
    .card.flex{flex:1 1 520px;}

    .muted{color:var(--muted);}
    .small{font-size:12px;}
    .ok{color:#0b6b2f;}
    .warn{color:#8a5a00;}

    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .pill{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:12px;background:#fff;color:#111827;font-weight:800;}

    table{width:100%;border-collapse:separate;border-spacing:0;margin-top:10px;font-size:14px;overflow:hidden;border:1px solid var(--border);border-radius:14px;background:#fff;}
    th,td{border-bottom:1px solid var(--border);padding:10px;vertical-align:top;text-align:left;}
    th{background:#f3f4f6;font-size:12px;color:#111827;text-transform:uppercase;letter-spacing:.04em;}
    tr:last-child td{border-bottom:0;}
    .hr{height:1px;background:var(--border);margin:10px 0;}

    textarea{width:100%;min-height:180px;border:1px solid var(--border);border-radius:14px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;}
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>7-Day Meal Planner</h1>
        <div class="sub">Balanced dinners + snacks with quantities + daily macro totals. Grocery list is combined.</div>
      </div>
      <div class="spacer"></div>
      <button id="btnGenerate" class="btn primary">Generate plan</button>
      <div class="tabs" role="tablist" aria-label="View">
        <button class="tab active" id="tabBoth">Both</button>
        <button class="tab" id="tabBen">Ben</button>
        <button class="tab" id="tabKath">Kathleen</button>
      </div>
    </div>

    <div class="small muted" id="status" style="margin-top:10px"></div>

    <div class="row">
      <div class="card flex">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <h3 style="margin:0;font-size:16px;">Weekly plan</h3>
        </div>
        <div id="planMeta" class="pills"></div>
        <div id="planWrap" class="muted" style="margin-top:10px">Generate a plan to see meals.</div>
      </div>

      <div class="card flex">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <h3 style="margin:0;font-size:16px;">Combined grocery list</h3>
          <div style="flex:1"></div>
          <button id="btnPrompt" class="btn">Copy Walmart+ InHome prompt</button>
        </div>
        <div id="groceryWrap" class="muted" style="margin-top:10px">Generate a plan to see grocery list.</div>
        <div id="promptWrap" style="display:none;margin-top:10px">
          <div class="small muted" style="margin-bottom:6px">Prompt (auto-copied):</div>
          <textarea id="promptText" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

<script>
  // Hardcoded Google Sheet
  const SHEET_ID = "1Uy_3n_-NYtTfILbHNENONlrXVhl4AUY2thzCjyNquos";
  const GIDS = {
    proteins: "1050228569",
    veggies:  "198265646",
    carbs:    "815210098",
    snacks:   "2128372880",
  };

  // Targets / settings
  const PEOPLE = {
    kathleen: { name: "Kathleen", dailyCals: 1500, snackProteinTarget: 35 },
    ben:      { name: "Ben",      dailyCals: 1800, snackProteinTarget: 45 },
  };
  const DINNER_PCT = 0.50;
  const FLEX_BUFFER = 300;

  // Snack planning knobs
  const SNACK_POOL_SIZE = 6;
  const MAX_SNACKS_PER_DAY = 3;

  // Dinner scaling knobs
  const VEG_BASE_MULT = 1.0;
  const MIN_PROTEIN_MULT = 0.6;
  const MAX_PROTEIN_MULT = 2.2;
  const MIN_CARB_MULT = 0.5;
  const MAX_CARB_MULT = 2.2;

  let viewMode = "both"; // both | ben | kathleen
  let lastResult = null;

  const $ = (id) => document.getElementById(id);

  // Tabs
  function setView(mode){
    viewMode = mode;
    ["tabBoth","tabBen","tabKath"].forEach(id => $(id).classList.remove("active"));
    if (mode === "both") $("tabBoth").classList.add("active");
    if (mode === "ben") $("tabBen").classList.add("active");
    if (mode === "kathleen") $("tabKath").classList.add("active");
    if (lastResult) renderAll(lastResult);
  }
  $("tabBoth").onclick = () => setView("both");
  $("tabBen").onclick = () => setView("ben");
  $("tabKath").onclick = () => setView("kathleen");

  function sheetCsvUrl(gid){
    return `https://docs.google.com/spreadsheets/d/${encodeURIComponent(SHEET_ID)}/export?format=csv&gid=${encodeURIComponent(gid)}`;
  }

  async function fetchCsv(gid){
    const res = await fetch(sheetCsvUrl(gid), { cache: "no-store" });
    if (!res.ok) throw new Error(`CSV fetch failed (${res.status}). Publish each tab to the web in Google Sheets.`);
    return await res.text();
  }

  function parseCSV(text){
    const rows = [];
    let row = [], cur = "", inQuotes = false;
    for (let i=0;i<text.length;i++){
      const ch = text[i];
      const next = text[i+1];
      if (ch === '"'){
        if (inQuotes && next === '"'){ cur += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes){
        row.push(cur); cur = "";
      } else if ((ch === '\n' || ch === '\r') && !inQuotes){
        if (ch === '\r' && next === '\n') i++;
        row.push(cur); cur = "";
        if (row.some(c => c.trim() !== "")) rows.push(row);
        row = [];
      } else {
        cur += ch;
      }
    }
    row.push(cur);
    if (row.some(c => c.trim() !== "")) rows.push(row);
    return rows;
  }

  function normHeader(h){
    return h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  }

  function csvToObjects(csvText){
    const rows = parseCSV(csvText);
    if (!rows.length) return [];
    const headers = rows[0].map(normHeader);
    const out = [];
    for (let i=1;i<rows.length;i++){
      const r = rows[i];
      const o = {};
      headers.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
      if (!o.name && o.item) o.name = o.item;
      if (!o.name && o.food) o.name = o.food;
      if ((o.name||"").trim() !== "") out.push(o);
    }
    return out;
  }

  function n(x){
    const v = Number(x);
    return Number.isFinite(v) ? v : 0;
  }

  function shuffle(arr){
    const a = [...arr];
    for (let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function pickUnique(arr, count){
    return shuffle(arr).slice(0, Math.min(count, arr.length));
  }

  function calcDinnerTargets(){
    const targets = {};
    for (const key of Object.keys(PEOPLE)){
      const daily = PEOPLE[key].dailyCals;
      const dinner = daily * DINNER_PCT;
      const snack = Math.max(0, daily - dinner - FLEX_BUFFER);
      targets[key] = { dinnerCals: dinner, snackCals: snack, snackProteinTarget: PEOPLE[key].snackProteinTarget };
    }
    return targets;
  }

  function itemMacros(item){
    return {
      calories: n(item.calories),
      protein: n(item.protein_g),
      carbs:   n(item.carbs_g),
      fat:     n(item.fat_g),
      defaultQty: n(item.defaultqty) || 1,
      unit: item.unit || "",
      buy: item.buy || "Either",
      name: item.name,
      // Optional future columns:
      tags: item.tags || "",
      avoid: item.avoid || "",
    };
  }

  // ---- Balanced dinners: 3 / 3 / 2 distribution across the 3 chosen items
  function makeBalancedIndexSchedule(){
    const twoIdx = Math.floor(Math.random()*3);
    const arr = [];
    for (let i=0;i<3;i++){
      const count = (i === twoIdx) ? 2 : 3;
      for (let k=0;k<count;k++) arr.push(i);
    }
    return shuffle(arr); // length 7
  }

  function tokenizeCSV(s){
    // Accepts tags/avoid like:
    // "italian, texmex" OR "italian;texmex" OR "italian | texmex" OR "italian texmex"
    // Use single-word tokens (hyphens ok).
    const cleaned = String(s||"")
      .toLowerCase()
      .replaceAll(";", ",")
      .replaceAll("|", ",");

    const out = [];
    cleaned.split(",").forEach(part => {
      const p = part.trim();
      if (!p) return;
      p.split(" ").forEach(tok => {
        const t = tok.trim();
        if (t) out.push(t);
      });
    });

    return Array.from(new Set(out));
  }

  function violatesCompatibility(p, v, c){
    // Uses optional sheet columns:
    // - Tags: tokens separated by commas/semicolons/pipes/spaces (e.g. "dinner italian" or "texmex, spicy")
    // - Avoid: tokens to block (e.g. "breakfast" or "italian" or "seafood")
    // Rule: if ANY item's avoid-token matches ANY tag-token in the combo, reject the combo.

    const pt = tokenizeCSV(p.tags);
    const vt = tokenizeCSV(v.tags);
    const ct = tokenizeCSV(c.tags);
    const tags = new Set([...pt, ...vt, ...ct]);

    const pa = tokenizeCSV(p.avoid);
    const va = tokenizeCSV(v.avoid);
    const ca = tokenizeCSV(c.avoid);

    const bad = (avoidList)=> avoidList.some(t => tags.has(t));
    return bad(pa) || bad(va) || bad(ca);
  }

  function generate7UniqueDinners(proteins, veggies, carbs){
    const P = pickUnique(proteins, 3);
    const V = pickUnique(veggies, 3);
    const C = pickUnique(carbs, 3);

    const pBase = makeBalancedIndexSchedule();
    const vBase = makeBalancedIndexSchedule();
    const cBase = makeBalancedIndexSchedule();

    const maxTries = 300;
    for (let t=0;t<maxTries;t++){
      const pSched = t ? shuffle(pBase) : [...pBase];
      const vSched = t ? shuffle(vBase) : [...vBase];
      const cSched = t ? shuffle(cBase) : [...cBase];

      const dinners = [];
      const seen = new Set();
      let ok = true;

      for (let d=0; d<7; d++){
        const p = P[pSched[d]];
        const v = V[vSched[d]];
        const c = C[cSched[d]];
        const key = `${p.name}||${v.name}||${c.name}`;

        if (seen.has(key)) { ok = false; break; }
        if (violatesCompatibility(p,v,c)) { ok = false; break; }

        seen.add(key);
        dinners.push({ p, v, c });
      }

      if (ok) return { pools: { P, V, C }, dinners };
    }

    // Fallback: still balanced; if constraints are extreme you might get a repeated combo
    const dinners = [];
    for (let d=0; d<7; d++){
      dinners.push({ p: P[pBase[d]], v: V[vBase[d]], c: C[cBase[d]] });
    }
    return { pools: { P, V, C }, dinners };
  }

  function scaleDinnerForPerson(protein, veg, carb, targetDinnerCals){
    const p = itemMacros(protein);
    const v = itemMacros(veg);
    const c = itemMacros(carb);

    const baseCalories = (p.calories || 0) + (v.calories || 0) + (c.calories || 0);
    if (baseCalories <= 0 || targetDinnerCals <= 0){
      return { proteinMult: 1, vegMult: 1, carbMult: 1, totals: { calories: 0, protein: 0, carbs: 0, fat: 0 }, hasMacros: false };
    }

    const vegMult = VEG_BASE_MULT;
    const vegCalories = v.calories * vegMult;

    const remaining = Math.max(0, targetDinnerCals - vegCalories);

    // protein : carb = 2:1 inside the remaining calories
    const targetProteinCalories = remaining * (2/3);
    const targetCarbCalories = remaining * (1/3);

    let proteinMult = p.calories > 0 ? (targetProteinCalories / p.calories) : 1;
    let carbMult    = c.calories > 0 ? (targetCarbCalories / c.calories) : 1;

    proteinMult = Math.min(MAX_PROTEIN_MULT, Math.max(MIN_PROTEIN_MULT, proteinMult));
    carbMult    = Math.min(MAX_CARB_MULT, Math.max(MIN_CARB_MULT, carbMult));

    const totals = {
      calories: p.calories*proteinMult + v.calories*vegMult + c.calories*carbMult,
      protein:  p.protein*proteinMult  + v.protein*vegMult  + c.protein*carbMult,
      carbs:    p.carbs*proteinMult    + v.carbs*vegMult    + c.carbs*carbMult,
      fat:      p.fat*proteinMult      + v.fat*vegMult      + c.fat*carbMult,
    };

    return { proteinMult, vegMult, carbMult, totals, hasMacros: true };
  }

  // Snack pool rule (6 unique snacks weekly) + distinct daily combos
  function chooseSnackPool(snacks){
    const sorted = [...snacks].sort((a,b)=> n(b.protein_g)-n(a.protein_g));
    const pool = [];
    if (sorted.length) pool.push(sorted[0]);
    const rest = snacks.filter(s => s !== pool[0]);
    pool.push(...pickUnique(rest, Math.max(0, SNACK_POOL_SIZE - pool.length)));
    return pool.slice(0, Math.min(SNACK_POOL_SIZE, snacks.length));
  }

  function buildWeeklySnackSchedule(snackPool){
    if (!snackPool || snackPool.length < SNACK_POOL_SIZE){
      throw new Error(`Need at least ${SNACK_POOL_SIZE} unique snacks in the weekly snack pool.`);
    }
    const s = snackPool;
    return [
      [s[0], s[1], s[2]],
      [s[1], s[2], s[3]],
      [s[2], s[3], s[4]],
      [s[3], s[4], s[5]],
      [s[4], s[5], s[0]],
      [s[5], s[0], s[1]],
      [s[0], s[2], s[5]],
    ];
  }

  function planSnacksForPerson(snackPool, snackCalTarget, snackProteinTarget){
    const pool = [...snackPool].filter(s => n(s.calories) > 0 || n(s.protein_g) > 0);

    pool.sort((a,b)=>{
      const aC = Math.max(1, n(a.calories));
      const bC = Math.max(1, n(b.calories));
      const aD = n(a.protein_g)/aC;
      const bD = n(b.protein_g)/bC;
      if (bD !== aD) return bD - aD;
      return n(a.calories) - n(b.calories);
    });

    const picks = [];
    let totalC = 0, totalP = 0, totalCarb = 0, totalFat = 0;

    for (const s of pool){
      if (picks.length >= MAX_SNACKS_PER_DAY) break;

      const c = n(s.calories);
      const p = n(s.protein_g);
      const carb = n(s.carbs_g);
      const fat = n(s.fat_g);

      if (totalC + c <= snackCalTarget * 1.05){
        picks.push(s);
        totalC += c;
        totalP += p;
        totalCarb += carb;
        totalFat += fat;

        if (totalC >= snackCalTarget * 0.90 && totalP >= snackProteinTarget) break;
      }
    }

    return { picks, totals: { calories: totalC, protein: totalP, carbs: totalCarb, fat: totalFat } };
  }

  function buildGrocery(plan){
    const map = new Map();

    function add(category, item, multSum){
      const m = itemMacros(item);
      const qty = (m.defaultQty || 1) * (multSum || 1);
      const unit = (m.unit || "").trim();
      const buy = (m.buy || "Either").trim();
      const key = `${category}||${m.name}||${unit}||${buy}`;
      const prev = map.get(key) || { category, name: m.name, unit, buy, qty: 0 };
      prev.qty += qty;
      map.set(key, prev);
    }

    for (const day of plan.days){
      const d = day.dinner;
      add("Protein", d.p, day.kDinner.proteinMult + day.bDinner.proteinMult);
      add("Veg", d.v, day.kDinner.vegMult + day.bDinner.vegMult);
      add("Carb", d.c, day.kDinner.carbMult + day.bDinner.carbMult);

      for (const s of day.kSnacks.picks) add("Snack", s, 1);
      for (const s of day.bSnacks.picks) add("Snack", s, 1);
    }

    const items = [...map.values()];
    items.sort((a,b)=> a.category.localeCompare(b.category) || a.buy.localeCompare(b.buy) || a.name.localeCompare(b.name));
    return items;
  }

  function fmtQty(defaultQty, unit, mult){
    const q = (n(defaultQty)||1) * (mult||1);
    const u = (unit||"").toLowerCase();
    const rounded = u.includes("oz") ? Math.round(q*10)/10 : Math.round(q*100)/100;

    if (u === "oz"){
      const lbs = Math.round((rounded/16)*100)/100;
      return `${rounded} oz (${lbs} lb)`;
    }
    return `${rounded} ${unit}`.trim();
  }

  function renderMeta(result){
    const pCounts = countBy(result.days.map(d=>d.dinner.p.name));
    const vCounts = countBy(result.days.map(d=>d.dinner.v.name));
    const cCounts = countBy(result.days.map(d=>d.dinner.c.name));

    $("planMeta").innerHTML = `
      <span class="pill">Proteins: ${fmtCounts(pCounts)}</span>
      <span class="pill">Fibrous sides: ${fmtCounts(vCounts)}</span>
      <span class="pill">Carbs: ${fmtCounts(cCounts)}</span>
    `;
  }

  function countBy(arr){
    const m = {};
    for (const x of arr) m[x] = (m[x]||0)+1;
    return m;
  }

  function fmtCounts(map){
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}×${v}`).join(" • ");
  }

  function renderPlan(result){
    function snackLines(sn){
      return sn.picks.map(s=> {
        const m = itemMacros(s);
        return `${m.name} — ${fmtQty(m.defaultQty,m.unit,1)} (~${Math.round(m.calories)} cal, ${Math.round(m.protein)}g protein)`;
      });
    }

    function totalsHtml(personKey, dinnerObj, snacksObj){
      const dailyGoal = PEOPLE[personKey].dailyCals;
      const plannedGoal = dailyGoal - FLEX_BUFFER;
      const dayCals = (dinnerObj?.totals?.calories || 0) + (snacksObj?.totals?.calories || 0);
      const dayProtein = (dinnerObj?.totals?.protein || 0) + (snacksObj?.totals?.protein || 0);
      const dayCarbs = (dinnerObj?.totals?.carbs || 0) + (snacksObj?.totals?.carbs || 0);
      const dayFat = (dinnerObj?.totals?.fat || 0) + (snacksObj?.totals?.fat || 0);

      const delta = Math.round(dayCals - plannedGoal);
      const deltaText = delta === 0 ? "on target" : (delta > 0 ? `+${delta}` : `${delta}`);

      return `
        <div class="small">
          <div><b>${PEOPLE[personKey].name}</b>: ~${Math.round(dayCals)} / ${Math.round(plannedGoal)} planned <span class="muted">(buffer ${FLEX_BUFFER})</span> • <b>${deltaText} cal</b></div>
          <div class="muted">Macros est: ${Math.round(dayProtein)}g P • ${Math.round(dayCarbs)}g C • ${Math.round(dayFat)}g F</div>
        </div>
      `;
    }

    let html = `<table>
      <thead>
        <tr>
          <th style="width:70px">Day</th>
          <th>Dinner</th>
          <th>Amounts</th>
          <th>Snacks</th>
          <th style="width:260px">Totals vs goal</th>
        </tr>
      </thead>
      <tbody>`;

    result.days.forEach((day, idx) => {
      const d = day.dinner;
      const dinnerName = `<b>${d.p.name}</b> + ${d.v.name} + ${d.c.name}`;

      const pM = itemMacros(d.p);
      const vM = itemMacros(d.v);
      const cM = itemMacros(d.c);

      const k = day.kDinner;
      const b = day.bDinner;

      let amounts = "";
      if (!k.hasMacros || !b.hasMacros){
        amounts = `<span class="warn">Add Calories + macros to dinner items in your Sheet to enable scaling + totals.</span>`;
      } else {
        if (viewMode === "both"){
          amounts = `
            <div class="small">
              <div><b>Protein</b> — ${fmtQty(pM.defaultQty,pM.unit,k.proteinMult)} (K) • ${fmtQty(pM.defaultQty,pM.unit,b.proteinMult)} (B)</div>
              <div><b>Veg</b> — ${fmtQty(vM.defaultQty,vM.unit,k.vegMult)} (K) • ${fmtQty(vM.defaultQty,vM.unit,b.vegMult)} (B)</div>
              <div><b>Carb</b> — ${fmtQty(cM.defaultQty,cM.unit,k.carbMult)} (K) • ${fmtQty(cM.defaultQty,cM.unit,b.carbMult)} (B)</div>
            </div>`;
        } else if (viewMode === "ben"){
          amounts = `<div class="small">
            <div><b>Protein</b> — ${fmtQty(pM.defaultQty,pM.unit,b.proteinMult)}</div>
            <div><b>Veg</b> — ${fmtQty(vM.defaultQty,vM.unit,b.vegMult)}</div>
            <div><b>Carb</b> — ${fmtQty(cM.defaultQty,cM.unit,b.carbMult)}</div>
          </div>`;
        } else {
          amounts = `<div class="small">
            <div><b>Protein</b> — ${fmtQty(pM.defaultQty,pM.unit,k.proteinMult)}</div>
            <div><b>Veg</b> — ${fmtQty(vM.defaultQty,vM.unit,k.vegMult)}</div>
            <div><b>Carb</b> — ${fmtQty(cM.defaultQty,cM.unit,k.carbMult)}</div>
          </div>`;
        }
      }

      let snacksCell = "";
      if (viewMode === "both"){
        snacksCell = `
          <div class="small"><b>K snacks</b><br>${snackLines(day.kSnacks).join("<br>") || "(none)"}<br>
          <span class="ok">~${Math.round(day.kSnacks.totals.calories)} cal • ${Math.round(day.kSnacks.totals.protein)}g protein</span></div>
          <div class="hr"></div>
          <div class="small"><b>B snacks</b><br>${snackLines(day.bSnacks).join("<br>") || "(none)"}<br>
          <span class="ok">~${Math.round(day.bSnacks.totals.calories)} cal • ${Math.round(day.bSnacks.totals.protein)}g protein</span></div>`;
      } else if (viewMode === "ben"){
        snacksCell = `<div class="small">${snackLines(day.bSnacks).join("<br>") || "(none)"}<br>
          <span class="ok">~${Math.round(day.bSnacks.totals.calories)} cal • ${Math.round(day.bSnacks.totals.protein)}g protein</span></div>`;
      } else {
        snacksCell = `<div class="small">${snackLines(day.kSnacks).join("<br>") || "(none)"}<br>
          <span class="ok">~${Math.round(day.kSnacks.totals.calories)} cal • ${Math.round(day.kSnacks.totals.protein)}g protein</span></div>`;
      }

      let totalsCell = "";
      if (viewMode === "both"){
        totalsCell = totalsHtml("kathleen", day.kDinner, day.kSnacks)
          + `<div class="hr"></div>`
          + totalsHtml("ben", day.bDinner, day.bSnacks);
      } else if (viewMode === "ben"){
        totalsCell = totalsHtml("ben", day.bDinner, day.bSnacks);
      } else {
        totalsCell = totalsHtml("kathleen", day.kDinner, day.kSnacks);
      }

      html += `
        <tr>
          <td>Day ${idx+1}</td>
          <td>${dinnerName}</td>
          <td>${amounts}</td>
          <td>${snacksCell}</td>
          <td>${totalsCell}</td>
        </tr>`;
    });

    html += `</tbody></table>`;
    $("planWrap").innerHTML = html;
  }

  function renderGrocery(result){
    const items = result.grocery;
    if (!items.length){
      $("groceryWrap").innerHTML = "No grocery items.";
      return;
    }

    let html = `<table>
      <thead>
        <tr>
          <th style="width:90px">Category</th>
          <th>Item</th>
          <th style="width:160px">Buy pref</th>
          <th style="width:150px">Qty (combined)</th>
        </tr>
      </thead>
      <tbody>`;

    for (const it of items){
      const qty = Math.round(it.qty*100)/100;
      let qtyText = `${qty} ${it.unit}`.trim();
      if ((it.unit||"").toLowerCase() === "oz"){
        const lbs = Math.round((qty/16)*100)/100;
        qtyText = `${qty} oz (${lbs} lb)`;
      }

      let buy = (it.buy||"Either");
      if (/frozen/i.test(buy)) buy = "Frozen (store brand)";
      else if (/fresh/i.test(buy)) buy = "Fresh (store brand)";
      else buy = "Either (store brand)";

      html += `<tr>
        <td>${it.category}</td>
        <td>${it.name}</td>
        <td>${buy}</td>
        <td>${qtyText}</td>
      </tr>`;
    }

    html += `</tbody></table>`;
    $("groceryWrap").innerHTML = html;
  }

  function buildWalmartPrompt(result){
    const items = result.grocery;
    const byCat = { Protein:[], Veg:[], Carb:[], Snack:[] };
    for (const it of items) (byCat[it.category] ||= []).push(it);

    function line(it){
      const qty = Math.round(it.qty*100)/100;
      const unit = (it.unit||"").trim();
      let qtyText = `${qty} ${unit}`.trim();
      if (unit.toLowerCase() === "oz"){
        const lbs = Math.round((qty/16)*100)/100;
        qtyText = `${qty} oz (${lbs} lb)`;
      }
      const buyRaw = (it.buy||"Either");
      const buy = /frozen/i.test(buyRaw) ? "Frozen" : (/fresh/i.test(buyRaw) ? "Fresh" : "Either");
      return `- ${it.name} — REQUIRED: ${qtyText} minimum (OK to exceed) — prefer ${buy} — store brand/private label`;
    }

    const parts = [];
    parts.push(
`You are my shopping assistant.

Goal: Place a Walmart+ InHome Delivery order for the soonest available delivery time.

Preferences (follow strictly):
- Prioritize Walmart private label / store brand (ex: Great Value) over name brands.
- Prioritize frozen vegetables and frozen proteins unless the item explicitly says Fresh.
- Keep ingredients simple and healthy; no extra items not listed.
- Gluten-free: choose gluten-free versions where applicable (GF pasta, GF bread, corn/GF tortillas).
- Quantity rule (important): buy at least the requested amount. If the exact size isn’t available, go bigger — do NOT go under.
- Units rule: think in lb/oz for meats, cups/oz for foods, and whole items when needed. Do not use “bags” as a unit.
- If an exact item isn’t available, choose the closest substitute that matches:
  (1) same food type, (2) similar macros, (3) private label, (4) frozen-first.
- Avoid giant bulk sizes unless it’s clearly cheaper and freezer-friendly AND still reasonable for a week.

Instructions:
1) Add each line item below.
2) When sizes don’t match the request, choose sizes that MEET OR EXCEED the required quantity (lean heavy).
3) Before checkout, summarize substitutions (if any).
4) Schedule the soonest InHome delivery slot.
`
    );

    parts.push("\nPROTEINS"); (byCat.Protein||[]).forEach(it => parts.push(line(it)));
    parts.push("\nFROZEN / FRESH VEG SIDES"); (byCat.Veg||[]).forEach(it => parts.push(line(it)));
    parts.push("\nCARBS"); (byCat.Carb||[]).forEach(it => parts.push(line(it)));
    parts.push("\nSNACKS"); (byCat.Snack||[]).forEach(it => parts.push(line(it)));

    return parts.join("\n");
  }

  function renderAll(result){
    renderMeta(result);
    renderPlan(result);
    renderGrocery(result);
    $("promptText").value = buildWalmartPrompt(result);
  }

  async function generate(){
    $("btnGenerate").disabled = true;
    $("status").textContent = "Loading lists...";

    try {
      const [pCsv, vCsv, cCsv, sCsv] = await Promise.all([
        fetchCsv(GIDS.proteins),
        fetchCsv(GIDS.veggies),
        fetchCsv(GIDS.carbs),
        fetchCsv(GIDS.snacks),
      ]);

      const proteins = csvToObjects(pCsv);
      const veggies  = csvToObjects(vCsv);
      const carbs    = csvToObjects(cCsv);
      const snacks   = csvToObjects(sCsv);

      if (proteins.length < 3 || veggies.length < 3 || carbs.length < 3){
        throw new Error("Need at least 3 items in Proteins, Veggies, and Carbs.");
      }
      if (snacks.length < 6){
        throw new Error("Need at least 6 items in Snacks.");
      }

      const targets = calcDinnerTargets();

      // Balanced dinners: proteins + fibrous sides + carbs all forced to 3/3/2 across 7 days
      const dinnerGen = generate7UniqueDinners(proteins, veggies, carbs);

      // Snacks: 6 snack pool + 7 unique daily candidate sets
      const snackPool = chooseSnackPool(snacks);
      if (snackPool.length < SNACK_POOL_SIZE){
        throw new Error(`Need at least ${SNACK_POOL_SIZE} unique snacks to build the weekly snack pool.`);
      }
      const snackSchedule = buildWeeklySnackSchedule(snackPool);

      const days = [];
      for (let i=0;i<7;i++){
        const dinner = dinnerGen.dinners[i];

        const kDinner = scaleDinnerForPerson(dinner.p, dinner.v, dinner.c, targets.kathleen.dinnerCals);
        const bDinner = scaleDinnerForPerson(dinner.p, dinner.v, dinner.c, targets.ben.dinnerCals);

        const snackCandidates = snackSchedule[i];
        const kSnacks = planSnacksForPerson(snackCandidates, targets.kathleen.snackCals, targets.kathleen.snackProteinTarget);
        const bSnacks = planSnacksForPerson(snackCandidates, targets.ben.snackCals, targets.ben.snackProteinTarget);

        days.push({ dinner, kDinner, bDinner, kSnacks, bSnacks });
      }

      const result = { pools: dinnerGen.pools, days, grocery: buildGrocery({ days }), targets };
      lastResult = result;

      $("status").innerHTML = `<span class="ok">Generated.</span> <span class="muted">Dinner distribution enforced: 3–3–2 for proteins, fibrous sides, and carbs.</span>`;
      renderAll(result);

    } catch (err){
      console.error(err);
      $("status").innerHTML = `<span class="warn">${(err && err.message) ? err.message : String(err)}</span>`;
      $("planWrap").innerHTML = `<span class="warn">Could not generate. Most common fix: Google Sheets → File → Share → Publish to the web (publish each tab).</span>`;
      $("groceryWrap").innerHTML = "";
      $("planMeta").innerHTML = "";
    } finally {
      $("btnGenerate").disabled = false;
    }
  }

  $("btnGenerate").onclick = generate;

  $("btnPrompt").onclick = async () => {
    if (!lastResult){
      alert("Generate a plan first.");
      return;
    }
    const text = $("promptText").value;
    try { await navigator.clipboard.writeText(text); } catch {}
    $("promptWrap").style.display = "block";
    $("status").innerHTML = `<span class="ok">Copied Walmart prompt.</span> <span class="muted">Paste into agent mode.</span>`;
  };
</script>
</body>
</html>
